<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Explosão do Game - Payload Injector</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"><style>:root{--bg:#0a0a0a;--accent:#ff6600;--text:#ffffff;--card:#1a1a1a}body{background-color:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;margin:0;padding:20px}h1,h2{font-family:'Orbitron',sans-serif;color:var(--accent);text-align:center}.container{max-width:900px;margin:auto}.config-panel{background:var(--card);padding:20px;border-radius:10px;border:1px solid var(--accent);margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}input,select,button{padding:10px;border-radius:5px;border:none;background:#333;color:white}button{background:var(--accent);cursor:pointer;font-weight:bold;transition:0.3s}button:hover{background:#cc5200}.tabs{display:flex;justify-content:center;gap:20px;margin-bottom:20px}.tab-btn{background:none;border:1px solid var(--accent);padding:10px 30px}.tab-btn.active{background:var(--accent)}.payload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}.card{background:var(--card);padding:15px;border-radius:8px;border-left:4px solid var(--accent)}.btn-group{display:flex;gap:10px;margin-top:10px}#status{text-align:center;margin:10px;font-weight:bold;color:var(--accent)}footer{text-align:center;margin-top:40px;padding:20px;border-top:1px solid #333}</style></head><body><div class="container"><h1>EXPLOSÃO DO GAME</h1><div class="config-panel"><input type="text" id="ip" placeholder="IP do Console (ex: 192.168.1.10)"><select id="port"><option value="9020">9020</option><option value="9021">9021</option><option value="9090">9090</option></select><button onclick="testConnection()">Testar Conexão</button></div><div id="status"></div><div class="tabs"><button class="tab-btn active" onclick="showTab('ps4')">PS4</button><button class="tab-btn" onclick="showTab('ps5')">PS5</button></div><div id="ps4-content" class="payload-grid"></div><div id="ps5-content" style="display:none;text-align:center;padding:50px"><h2>EM BREVE</h2></div><footer><a href="https://youtube.com/@ExplosaodoGame" style="color:var(--accent)" target="_blank">YouTube: @ExplosaodoGame</a></footer></div><script>const payloads=['goldhen.bin','ps4-app-dumper.bin','ps4-app2usb.bin','ps4-backup.bin','ps4-disable-aslr.bin','ps4-disable-updates.bin','ps4-enable-browser.bin','ps4-enable-updates.bin','ps4-exit-idu.bin','ps4-fan-threshold.bin','ps4-ftp.bin','ps4-history-blocker.bin','ps4-kernel-clock.bin','ps4-kernel-dumper.bin','SetVueUpdate_Full_2.0.elf','np-fake-signin-ps4.elf'];const base='https://vinasxexplosao.github.io/explosao-hb-payloads/payloads/ps4/';const container=document.getElementById('ps4-content');payloads.forEach(p=>{const div=document.createElement('div');div.className='card';div.innerHTML=`<h3>${p}</h3><div class='btn-group'><a href='${base}${p}' download class='btn' style='background:#444;padding:10px;text-decoration:none;color:white'>DOWNLOAD</a><button onclick="inject('${p}')">INJECT</button></div>`;container.appendChild(div);});async function inject(file){const ip=document.getElementById('ip').value;const port=document.getElementById('port').value;const status=document.getElementById('status');if(!ip){alert('Digite o IP');return;}status.innerText='Enviando...';try{const res=await fetch(base+file);const blob=await res.arrayBuffer();const send=await fetch(`http://${ip}:${port}`,{method:'POST',body:blob});status.innerText='Payload enviado com sucesso!';}catch(e){status.innerText='Erro ao enviar: '+e.message;}}async function testConnection(){const ip=document.getElementById('ip').value;const port=document.getElementById('port').value;try{await fetch(`http://${ip}:${port}`,{mode:'no-cors'});alert('Conexão bem sucedida!');}catch(e){alert('Falha na conexão.');}}function showTab(t){document.getElementById('ps4-content').style.display=t==='ps4'?'grid':'none';document.getElementById('ps5-content').style.display=t==='ps5'?'block':'none';}</script></body></html>
