<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Explosão do Game - Payloads</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet"><style>:root{--bg:#0a0a0a;--card:#161616;--accent:#ff6600;--text:#e0e0e0}body{background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif;margin:0;padding:20px}h1,h2{font-family:'Orbitron',sans-serif;color:var(--accent)}header{text-align:center;margin-bottom:30px}.config-box{background:var(--card);padding:20px;border-radius:8px;border:1px solid #333;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}input,select,button{padding:10px;border-radius:4px;border:none}button{background:var(--accent);color:white;font-weight:bold;cursor:pointer;transition:0.3s}button:hover{filter:brightness(1.2)}.tabs{display:flex;gap:10px;justify-content:center;margin-bottom:20px}.tab-btn{background:#333}.tab-btn.active{background:var(--accent)}.payload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}.card{background:var(--card);padding:15px;border-left:4px solid var(--accent);border-radius:4px}.badge{font-size:0.7em;background:#333;padding:2px 6px;border-radius:4px}.btn-group{margin-top:15px;display:flex;gap:5px}footer{text-align:center;margin-top:50px;color:#666}#status{margin-top:10px;font-weight:bold}</style></head><body><header><h1>💥 Explosão do Game</h1><p>Repositório de Payloads PS4 & PS5</p></header><div class="config-box"><input type="text" id="ipInput" placeholder="IP do Console (ex: 192.168.1.50)"><select id="portSelect"><option value="9020">9020</option><option value="9021">9021</option><option value="9090">9090</option></select><button onclick="testConnection()">Testar Conexão</button><div id="status"></div></div><div class="tabs"><button class="tab-btn active" onclick="switchTab('ps4')">PS4</button><button class="tab-btn" onclick="switchTab('ps5')">PS5</button></div><div id="ps4-content" class="payload-grid"></div><div id="ps5-content" style="display:none;text-align:center;padding:50px"><h2>EM BREVE</h2></div><footer><p>YouTube: @ExplosaodoGame</p></footer><script>const payloads=['ps4-app-dumper.bin','ps4-app2usb.bin','ps4-backup.bin','ps4-disable-aslr.bin','ps4-disable-updates.bin','ps4-enable-browser.bin','ps4-enable-updates.bin','ps4-exit-idu.bin','ps4-fan-threshold.bin','ps4-ftp.bin','ps4-history-blocker.bin','ps4-kernel-clock.bin','ps4-kernel-dumper.bin','goldhen/goldhen.bin','SetVueUpdate_Full_2.0.elf','np-fake-signin-ps4.elf'];document.getElementById('ipInput').value=localStorage.getItem('ps_ip')||'';function switchTab(t){document.getElementById('ps4-content').style.display=t==='ps4'?'grid':'none';document.getElementById('ps5-content').style.display=t==='ps5'?'block':'none';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.innerText.toLowerCase()===t))}async function testConnection(){const ip=document.getElementById('ipInput').value;const port=document.getElementById('portSelect').value;localStorage.setItem('ps_ip',ip);const s=document.getElementById('status');s.innerText='Conectando...';try{const res=await fetch(`http://${ip}:${port}`,{mode:'no-cors'});s.innerText='Conexão OK';s.style.color='green'}catch(e){s.innerText='Erro de Conexão';s.style.color='red'}}async function inject(file){const ip=document.getElementById('ipInput').value;const port=document.getElementById('portSelect').value;if(!ip){alert('Defina o IP primeiro');return}try{const response=await fetch(`payloads/ps4/${file}`);const blob=await response.arrayBuffer();await fetch(`http://${ip}:${port}`,{method:'POST',body:blob});alert('Payload enviado com sucesso!')}catch(e){alert('Erro ao injetar: '+e.message)}}const container=document.getElementById('ps4-content');payloads.forEach(p=>{const name=p.split('/').pop();const ext=name.split('.').pop();container.innerHTML+=`<div class="card"><strong>${name}</strong><br><span class="badge">.${ext}</span><div class="btn-group"><a href="payloads/ps4/${p}" download><button style="background:#555">Download</button></a><button onclick="inject('${p}')">Injetar</button></div></div>`})</script></body></html>
