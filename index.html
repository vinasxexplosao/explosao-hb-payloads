<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explosao do Game</title>
<style>
body{background:#000;color:#fff;font-family:Arial,sans-serif;margin:0;padding:20px;text-align:center}
.box{width:700px;margin:0 auto;border:2px solid #ff6b00;padding:20px}
h1{color:#ff6b00;font-size:32px}
input{background:#111;color:#fff;border:1px solid #ff6b00;padding:8px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td{border-bottom:1px solid #333;padding:12px;text-align:left}
button{background:#ff6b00;color:#000;border:none;padding:8px 15px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h1>Explosao do Game</h1>
<p>IP: <input type="text" id="ip" value="192.168.1.50" size="15">
Porta: <input type="text" id="port" value="9020" size="6"></p>
<table id="lista"></table>
</div>
<script>
var arquivos = [
'goldhen.bin','ps4-app-dumper.bin','ps4-app2usb.bin','ps4-backup.bin',
'ps4-disable-aslr.bin','ps4-disable-updates.bin','ps4-enable-browser.bin',
'ps4-enable-updates.bin','ps4-exit-idu.bin','ps4-fan-threshold.bin',
'ps4-ftp.bin','ps4-history-blocker.bin','ps4-kernel-clock.bin',
'ps4-kernel-dumper.bin','SetVueUpdate_Full_2.0.elf','np-fake-signin-ps4.elf'
];
var tabela = document.getElementById('lista');
for(var i=0; i<arquivos.length; i++){
  var nome = arquivos[i];
  var caminho = 'explosao-hn-payloads-main/payloads/ps4/' + nome;
  tabela.innerHTML += '<tr><td>' + nome + '</td><td><a href="' + caminho + '" download><button>DOWNLOAD</button></a></td><td><button onclick="injetar(\'' + caminho + '\')">INJECT</button></td></tr>';
}
function injetar(caminho){
  var ip = document.getElementById('ip').value;
  var porta = document.getElementById('port').value;
  var url = 'http://' + ip + ':' + porta;
  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.send(caminho);
  alert('Enviando para ' + url);
}
</script>
</body>
</html>
